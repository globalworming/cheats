networks:
  cheatsh_network:
    ipam:
      config:
        - subnet: ${CHEAT_NETWORK:-11.76.88.0/24}


services:
  redis:
    image: redis:alpine
    restart: unless-stopped
    networks:
      - cheatsh_network

  cheatsh:
    build:
      context: ./app
    depends_on:
      - redis
    environment:
      CHEATSH_CACHE_REDIS_HOST: redis
      CHEATSH_CACHE_REDIS_PORT: "6379"
    networks:
      cheatsh_network:
        ipv4_address: ${CHEAT_IP:-11.76.88.254}
    restart: unless-stopped
    volumes:
      - ./app/upstream:/app/upstream:ro
      - ./sources/personal:/app/personal:ro
